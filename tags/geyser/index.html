    <main> <h1>Geyser</h1>   <h2><a href="/post/%E6%8A%80%E6%9C%AF/184/">修复Geyser下基岩版玩家无法在地狱基岩层放置方块</a></h2> <p>在<code>plugins\Geyser-Spigot\config.yml</code>中把第160行的<code>above-bedrock-nether-building: false</code>改为<code>true</code>，重启服务器，问题解决~
原理：geyser把下界翻译成了末地，会导致下界天空变成末地的样式，不过可以解决基岩版玩家在地狱基岩层的问题。</p>  </main>
