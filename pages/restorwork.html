
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上班吗？</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: #333;
        }

        .container {
            background-color: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
            font-size: 2.2rem;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-top: 0;
            font-size: 1.1rem;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            border-radius: 12px;
            background-color: #f8f9fa;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .section-title i {
            font-size: 28px;
            color: #3498db;
        }

        .option-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .option-button {
            flex: 1;
            min-width: 120px;
            max-width: 200px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background-color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 16px;
        }

        .option-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .option-button.selected {
            border-color: #3498db;
            background-color: #e1f0fa;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }

        .option-button.day1.selected {
            border-color: #3498db;
            background-color: #e1f0fa;
        }

        .option-button.day2.selected {
            border-color: #2ecc71;
            background-color: #e8f7ee;
        }

        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .month-input {
            padding: 14px 20px;
            border: 2px solid #3498db;
            border-radius: 10px;
            width: 120px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
        }
		
        .generate-btn {
            background: linear-gradient(to right, #3498db, #2c3e50);
            color: white;
            padding: 14px 35px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.6);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(to right, #3498db, #2c3e50);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }

        td {
            padding: 12px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .work-day-1 {
            background-color: #d4f1f9;
        }

        .work-day-2 {
            background-color: #c6f7e2;
        }

        .rest-day {
            background-color: #fdecea;
        }

        .status-indicator {
            display: inline-block;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }

        .work-indicator-1 {
            background-color: #3498db;
        }

        .work-indicator-2 {
            background-color: #2ecc71;
        }

        .rest-indicator {
            background-color: #e74c3c;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .legend {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        .summary {
            margin-top: 25px;
            padding: 18px;
            background: linear-gradient(to right, #3498db, #2c3e50);
            color: white;
            border-radius: 10px;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .instructions {
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }

        .instructions h3 {
            margin-top: 0;
            color: #2c3e50;
        }

        .instructions ul {
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        @media (max-width: 600px) {
            .section {
                padding: 15px;
            }

            .option-button {
                min-width: 100px;
                padding: 12px;
                font-size: 14px;
            }

            .month-input {
                width: 100px;
                padding: 12px;
            }

            .generate-btn {
                padding: 12px 20px;
                font-size: 16px;
            }

            th,
            td {
                padding: 10px 5px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>上班吗？</h1>
        <p class="subtitle">Develop by yingyu5658</p>

        <div class="instructions">
            <h3>使用说明：</h3>
            <ul>
                <li>选择上个月最后一天是两天班中的第几天</li>
                <li>输入要查询的月份（1-12）</li>
                <li>点击"生成工作日历"按钮获取轮班安排</li>
                <li>系统按照上二休一模式自动计算本月工作日历</li>
            </ul>
        </div>

        <div class="section">
            <h2 class="section-title">
                <i>📅</i> 上个月最后一天是两天班中的第几天？
            </h2>
            <div class="option-container">
                <div class="option-button day1" data-value="1">
                    <div class="status-indicator work-indicator-1"></div>
                    第1天班
                </div>
                <div class="option-button day2" data-value="2">
                    <div class="status-indicator work-indicator-2"></div>
                    第2天班
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">
                <i>📆</i> 要查询的是哪个月份？
            </h2>
            <div class="input-group">
                <input type="number" class="month-input" id="input-month" min="1" max="12" placeholder="1-12" value="6">
                <button class="generate-btn" id="generate-btn">生成工作日历</button>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">
                <i>📋</i> 本月工作日历
            </h2>
            <div id="calendar">
                <p
                    style="text-align: center; color: #7f8c8d; padding: 30px 20px; background: #f8f9fa; border-radius: 10px; border: 2px dashed #e0e0e0;">
                    请先选择上个月最后一天状态并输入要查询的月份
                </p>
            </div>
        </div>
    </div>

    <script>
        // 全局状态
        const state = {
            lastDayStatus: null, // 1: 第1天班, 2: 第2天班
            month: new Date().getMonth() + 1,
            year: new Date().getFullYear()
        };

        // 初始化事件监听
        function init() {
            // 上个月最后一天状态选择
            document.querySelectorAll('.option-button').forEach(button => {
                button.addEventListener('click', function () {
                    // 移除所有按钮的选择状态
                    document.querySelectorAll('.option-button').forEach(btn => {
                        btn.classList.remove('selected');
                    });

                    // 添加当前按钮的选择状态
                    this.classList.add('selected');

                    // 更新状态
                    state.lastDayStatus = parseInt(this.getAttribute('data-value'));
                });
            });

            // 生成日历按钮
            document.getElementById('generate-btn').addEventListener('click', generateCalendar);

            // 月份输入框
            document.getElementById('input-month').addEventListener('input', function () {
                let month = parseInt(this.value);
                if (month >= 1 && month <= 12) {
                    state.month = month;
                }
            });
        }

        // 获取指定月份的天数
        function getDaysInMonth(year, month) {
            return new Date(year, month, 0).getDate();
        }

        // 生成工作日历（上二休一模式）
        function generateCalendar() {
            if (state.lastDayStatus === null) {
                alert("请选择上个月最后一天是两天班中的第几天");
                return;
            }

            const month = state.month;
            const year = state.year;
            const daysInMonth = getDaysInMonth(year, month);

            // 初始化状态
            // 状态值: 0=休息, 1=第1天班, 2=第2天班
            let status;

            // 根据上个月最后一天的状态确定本月第一天状态
            if (state.lastDayStatus === 1) {
                // 上个月最后一天是第1天班 → 本月第一天是第2天班
                status = 2;
            } else {
                // 上个月最后一天是第2天班 → 本月第一天是休息
                status = 0;
            }

            let workdays1 = 0; // 第1天班计数
            let workdays2 = 0; // 第2天班计数
            let restdays = 0;  // 休息日计数

            // 创建表格HTML
            let tableHTML = `
                <div class="calendar-header">
                    <h3 style="margin:0;">${month}月工作日历</h3>
                    <div class="legend">
                        <div class="legend-item">
                            <span class="status-indicator work-indicator-1"></span>第1天班
                        </div>
                        <div class="legend-item">
                            <span class="status-indicator work-indicator-2"></span>第2天班
                        </div>
                        <div class="legend-item">
                            <span class="status-indicator rest-indicator"></span>休息日
                        </div>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>星期</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // 星期名称
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

            // 生成每一天的日历
            for (let day = 1; day <= daysInMonth; day++) {
                // 创建日期对象
                const date = new Date(year, month - 1, day);
                const dayOfWeek = date.getDay();
                const weekdayName = weekdays[dayOfWeek];

                // 判断当天状态
                let statusText, rowClass;
                switch (status) {
                    case 0:
                        statusText = '<span class="status-indicator rest-indicator"></span>休息';
                        rowClass = 'rest-day';
                        restdays++;
                        break;
                    case 1:
                        statusText = '<span class="status-indicator work-indicator-1"></span>上班 (第1天)';
                        rowClass = 'work-day-1';
                        workdays1++;
                        break;
                    case 2:
                        statusText = '<span class="status-indicator work-indicator-2"></span>上班 (第2天)';
                        rowClass = 'work-day-2';
                        workdays2++;
                        break;
                }

                // 添加行
                tableHTML += `
                    <tr class="${rowClass}">
                        <td>${month}月${day}日</td>
                        <td>星期${weekdayName}</td>
                        <td>${statusText}</td>
                    </tr>
                `;

                // 更新状态：0->1->2->0...
                status = (status + 1) % 3;
            }

            tableHTML += `
                    </tbody>
                </table>
                <div class="summary">
                    ${month}月统计：第1天班 ${workdays1}天 | 第2天班 ${workdays2}天 | 休息 ${restdays}天
                </div>
            `;

            // 更新日历显示
            document.getElementById('calendar').innerHTML = tableHTML;
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
