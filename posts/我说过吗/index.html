</time><span class=meta-categories>[<a href=/categories/%E9%9A%8F%E7%AC%94/ class=p-category>随笔</a>]</span></div></header><div class="e-content entry-body"><p>我见到了一个口齿不清又爱自言自语的人。</p><p>“我说过这个吗？”</p><p>“没说过啊？”</p><p>“哦哦对的对的哦不对不对哦对的对的。”</p><p>“我说过那个吗？”</p><p>“没说过啊？”</p><p>“这个不说了。”</p><p>“那个也不说了！”</p><p>“不对，哦哦对的对的，不对不对。”</p><p>我真说了，我真没说，我真说了！！！</p><p>对，对吗？</p></div></article><hr><footer class=post-footer><div class=post-declaration><p>条目共享：遵循 <a href=https://creativecommons.org/licenses/by-nc-sa/4.0/ rel="license noopener">CC BY-NC-SA 4.0</a> 协议。</p><p>交流通道：向 <a href="mailto:im@verdant.ee?subject=回复《%e6%88%91%e8%af%b4%e8%bf%87%e5%90%97%ef%bc%9f》">im@verdant.ee</a> 发送一封 <a href=https://useplaintext.email/>纯文本邮件</a>。</p></div></footer></main><footer><div class=copyright>© 2024 - 2026 <a href=https://verdant.ee>Verdant</a>. Build with Hugo.</div></footer></body></html>
