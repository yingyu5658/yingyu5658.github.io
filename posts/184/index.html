xml title=映屿><meta name=msvalidate.01 content="2E1AACF009206F2DDBAAD4B98E881460"><meta name=blogsclub-verify content="2fff06c4423c4f41ac048f779a7daab5"></head><body><main><header><a href=/><code>cd ~</code></a></header><hr><article><header><h1>修复Geyser下基岩版玩家无法在地狱基岩层放置方块</h1></header><p>在<code>plugins\Geyser-Spigot\config.yml</code>中把第160行的<code>above-bedrock-nether-building: false</code>改为<code>true</code>，重启服务器，问题解决~
