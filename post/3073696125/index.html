span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> cn.yingyu5658.basic;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> org.w3c.dom.ls.LSOutput;</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> java.util.Scanner;</span><br><span class="line"></span><br><span class="line"><span class="keyword">public</span> <span class="keyword">class</span> <span class="title class_">Basic</span> &#123;</span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title function_">main</span><span class="params">(String[] args)</span> &#123;</span><br><span class="line">        <span class="keyword">for</span> (; ; ) &#123;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">            System.out.println(<span class="string">&quot;欢迎使用！&quot;</span>);</span><br><span class="line">            System.out.println(<span class="string">&quot;按键1 2 3 4分别为加 减 乘 除，输入后请回车&quot;</span>);</span><br><span class="line">            <span class="type">Scanner</span> <span class="variable">startSc</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);</span><br><span class="line">            <span class="type">int</span> <span class="variable">selectNumber</span> <span class="operator">=</span> startSc.nextInt();</span><br><span class="line">            <span class="keyword">if</span>(selectNumber &gt;<span class="number">4</span>) &#123;</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入正确的数字以选择！&quot;</span>);</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//以下为加法</span></span><br><span class="line">            <span class="keyword">if</span> (selectNumber == <span class="number">1</span>) &#123;</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第一个数字&quot;</span>);</span><br><span class="line">                <span class="type">Scanner</span> <span class="variable">jiafaSc</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);</span><br><span class="line">                <span class="type">int</span> <span class="variable">jiafa1</span> <span class="operator">=</span> jiafaSc.nextInt();</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第二个数字&quot;</span>);</span><br><span class="line">                <span class="type">int</span> <span class="variable">jiafa2</span> <span class="operator">=</span> jiafaSc.nextInt();</span><br><span class="line">                jiafa(jiafa1, jiafa2);</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//以下为减法</span></span><br><span class="line">            <span class="keyword">if</span> (selectNumber == <span class="number">2</span>) &#123;</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第一个数字&quot;</span>);</span><br><span class="line">                <span class="type">Scanner</span> <span class="variable">jianfaSc</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);</span><br><span class="line">                <span class="type">int</span> <span class="variable">jianfa1</span> <span class="operator">=</span> jianfaSc.nextInt();</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第二个数字&quot;</span>);</span><br><span class="line">                <span class="type">int</span> <span class="variable">jianfa2</span> <span class="operator">=</span> jianfaSc.nextInt();</span><br><span class="line">                jianfa(jianfa1, jianfa2);</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//以下为乘法</span></span><br><span class="line">            <span class="keyword">if</span> (selectNumber == <span class="number">3</span>) &#123;</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第一个数字&quot;</span>);</span><br><span class="line">                <span class="type">Scanner</span> <span class="variable">chengfaSc</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);</span><br><span class="line">                <span class="type">int</span> <span class="variable">chengfa1</span> <span class="operator">=</span> chengfaSc.nextInt();</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第二个数字&quot;</span>);</span><br><span class="line">                <span class="type">int</span> <span class="variable">chengfa2</span> <span class="operator">=</span> chengfaSc.nextInt();</span><br><span class="line">                chengfa(chengfa1, chengfa2);</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="keyword">if</span> (selectNumber == <span class="number">4</span>) &#123;</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第一个数字&quot;</span>);</span><br><span class="line">                <span class="type">Scanner</span> <span class="variable">chufaSc</span> <span class="operator">=</span> <span class="keyword">new</span> <span class="title class_">Scanner</span>(System.in);</span><br><span class="line">                <span class="type">int</span> <span class="variable">chufa1</span> <span class="operator">=</span> chufaSc.nextInt();</span><br><span class="line">                System.out.println(<span class="string">&quot;请输入您要计算的第二个数字&quot;</span>);</span><br><span class="line">                <span class="type">int</span> <span class="variable">chufa2</span> <span class="operator">=</span> chufaSc.nextInt();</span><br><span class="line">                chufa(chufa1, chufa2);</span><br><span class="line">            &#125;</span><br><span class="line">            System.out.println(<span class="string">&quot;-----------------------------------------&quot;</span>);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">//加减乘除各项功能的方法，上面直接调用</span></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="type">int</span> <span class="title function_">jiafa</span><span class="params">(<span class="type">int</span> a, <span class="type">int</span> b)</span> &#123;</span><br><span class="line">        <span class="type">int</span> <span class="variable">jieguo</span> <span class="operator">=</span> a + b;</span><br><span class="line">        System.out.println(jieguo);</span><br><span class="line">        <span class="keyword">return</span> a + b;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="type">int</span> <span class="title function_">jianfa</span><span class="params">(<span class="type">int</span> a, <span class="type">int</span> b)</span> &#123;</span><br><span class="line">        <span class="type">int</span> <span class="variable">jieguo</span> <span class="operator">=</span> a - b;</span><br><span class="line">        System.out.println(jieguo);</span><br><span class="line">        <span class="keyword">return</span> a - b;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="type">int</span> <span class="title function_">chengfa</span><span class="params">(<span class="type">int</span> a, <span class="type">int</span> b)</span> &#123;</span><br><span class="line">        <span class="type">int</span> <span class="variable">jieguo</span> <span class="operator">=</span> a * b;</span><br><span class="line">        System.out.println(jieguo);</span><br><span class="line">        <span class="keyword">return</span> a * b;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">static</span> <span class="type">int</span> <span class="title function_">chufa</span><span class="params">(<span class="type">int</span> a, <span class="type">int</span> b)</span> &#123;</span><br><span class="line">        <span class="type">int</span> <span class="variable">jieguo</span> <span class="operator">=</span> a / b;</span><br><span class="line">        System.out.println(jieguo);</span><br><span class="line">        <span class="keyword">return</span> a / b;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
