<li>社交属性重：一旦开放评论，发布文章就带有社交属性了，影响写作。</li>
</ol>
<h2 id="一点废话">一点废话</h2>
<p>从去年建站至今，收到的有意义的评论寥寥无几。大概可以分为以下几种类型：</p>
<ul>
<li>熟人故意唱反调</li>
<li>棒读符合</li>
<li>广告

</ul>
