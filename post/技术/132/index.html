	   <h1 class="inner-post-title">【Hexo】配置好服务器后如何发表编辑好的文章？</h1> 
<time datetime="2024-12-08">
  Dec. 8, 2024
</time> 
   <hr>
<div class="post-content">
<ol>
<li><code>hexo s</code> 先在本地预览一下文章，如果都好了就进入下一步。</li>
<li><code>hexo clean</code> 清除缓存</li>
<li><code>hexo g</code> 生成文件</li>
<li><code>hexo d</code> 部署</li>
</ol>
<p>等待部署完成后刷新页面就好了</p>

</div>
