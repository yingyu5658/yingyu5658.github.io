			<h1 class="post__title">在VSCode上搭建C51单片机开发环境</h1>
			<div class="post__meta meta">
<div class="meta__item-datetime meta__item">
	<time class="meta__text" datetime="2025-05-12T18:56:36Z">May 12, 2025</time></div></div>
		</header><div class="content post__content clearfix">
			<div class="in-permalink">
			<p>安装插件<code>Embedded IDE</code></p>
<p><img src="/images/%E5%9C%A8VSCode%E4%B8%8A%E6%90%AD%E5%BB%BAC51%E5%8D%95%E7%89%87%E6%9C%BA%E5%BC%80%E5%8F%91%E7%8E%AF%E5%A2%83/image-20250512190017524.png" alt="Embedded IDE"></p>
<p>安装好后，左边一栏会多出一个芯片图标</p>
<p><img src="/images/%E5%9C%A8VSCode%E4%B8%8A%E6%90%AD%E5%BB%BAC51%E5%8D%95%E7%89%87%E6%9C%BA%E5%BC%80%E5%8F%91%E7%8E%AF%E5%A2%83/image-20250512190113812.png" alt="image-20250512190113812"></p>
<p>点击，选择Create Project</p>
<p><img src="/images/%E5%9C%A8VSCode%E4%B8%8A%E6%90%AD%E5%BB%BAC51%E5%8D%95%E7%89%87%E6%9C%BA%E5%BC%80%E5%8F%91%E7%8E%AF%E5%A2%83/image-20250512190345994.png" alt="image-20250512190345994"></p>
<p>选择第二个内置项目模板，然后找到8051。</p>
<p><img src="/images/%E5%9C%A8VSCode%E4%B8%8A%E6%90%AD%E5%BB%BAC51%E5%8D%95%E7%89%87%E6%9C%BA%E5%BC%80%E5%8F%91%E7%8E%AF%E5%A2%83/image-20250512190017524.png" alt="相关图片"></p>
