<div class="post-content">
<p>安装插件<code>Embedded IDE</code></p>
<p><img src="./image-20250512190017524.png" alt="Embedded IDE"></p>
<p>安装好后，左边一栏会多出一个芯片图标</p>
<p><img src="./image-20250512190113812.png" alt="image-20250512190113812"></p>
<p>点击，选择Create Project</p>
<p><img src="./image-20250512190345994.png" alt="image-20250512190345994"></p>
<p>选择第二个内置项目模板，然后找到8051。</p>
