			<div class="post__meta meta">
<div class="meta__item-datetime meta__item">
	<time class="meta__text" datetime="2025-01-04T08:35:00Z">January 04, 2025</time></div></div>
		</header><div class="content post__content clearfix">
			<div class="in-permalink">
			<ol>
<li>把<code>-Dfile.encoding=UTF-8</code>加在开服脚本文件的<code>-jar</code>前即可。</li>
<li>在启动脚本第一行加上<code>chcp 65001</code>
我的启动脚本如下：</li>
</ol>
<pre><code class="language-bash">chcp 65001
java -Dfile.encoding=UTF-8 -jar spigot-1.21.jar
</code></pre>
