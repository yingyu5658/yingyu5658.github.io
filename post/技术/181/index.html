    <main>   <time datetime="2025-01-04T08:35:00&#43;00:00">January 4, 2025</time> <h2>Spigot服务端控制台中文乱码解决方案</h2> <ol>
<li>把<code>-Dfile.encoding=UTF-8</code>加在开服脚本文件的<code>-jar</code>前即可。</li>
<li>在启动脚本第一行加上<code>chcp 65001</code>
我的启动脚本如下：</li>
</ol>
<div class="highlight"><pre tabindex="0" style="background-color:#f8f8f8;-moz-tab-size:4;-o-tab-size:4;tab-size:4;"><code class="language-bash" data-lang="bash"><span style="display:flex;"><span>chcp <span style="color:#666">65001</span>
</span></span><span style="display:flex;"><span>java -Dfile.encoding<span style="color:#666">=</span>UTF-8 -jar spigot-1.21.jar
</span></span></code></pre></div><p><img src="https://www.yingyu5658.cn/usr/uploads/2025/01/1203260069.jpg" alt=""></p>
