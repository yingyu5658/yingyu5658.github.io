			<p>把Hexo博客根目录用黑曜石打开，如果已经打开了仓库
<img src="./Pasted%20image%2020250305215423.png" alt="">
在弹出的窗口中选第二个。</p>
<p>在source目录下新建images文件夹用于存放图片
设置 =&gt; 文件与链接 =&gt; 附件默认存放路径：选择指定的附件文件夹。路径填写刚刚创建的image文件夹的相对路径
取消使用Wiki链接
注意。由于我的文件结构是这样的所以这么填写，要<strong>根据自己的文件结构填写相对路径</strong>。
<img src="./Pasted%20image%2020250305215642.png" alt="">
搞定，同时可以在本地编辑环境和博客网站中显示。</p>
